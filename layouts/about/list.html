{{ define "main" }}
<main class="page-main pa4" role="main">
  <section class="page-content mw7 center">
    <article class="post-content pa0 ph4-l">
      <header class="post-header">
        <h1 class="f1 lh-solid measure-narrow mb3 fw4">{{ .Title }}</h1>
        {{ with .Resources.GetMatch "sjlee.png" }}
        <img class="about-profile-image db mb2" src="{{ .RelPermalink }}" alt="Seung Jae Lee">
        {{ end }}
      </header>
      <section class="post-body about-body pt3 pb4">
        {{ .Content }}
      </section>
    </article>
  </section>
</main>
{{ end }}
